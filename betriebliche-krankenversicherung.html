<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Betriebliche Krankenversicherung (bKV) – fides GmbH Schongau</title>
<meta name="description" content="Betriebliche Krankenversicherung als steuerbegünstigter Gesundheits-Benefit. Beratung und Marktvergleich durch Ihren unabhängigen Versicherungsmakler in Schongau."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap"/>
<link rel="stylesheet" href="shared/styles.css"/>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared/components.jsx"></script>

<script type="text/babel" data-presets="react">
const { Icon, I, Header, Footer, SchnellcheckSection, CTAStrip } = window.fides;

const HERO_IMG = "url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=2000&q=80')";

function Page() {
  return (
    <>
      <Header active="bkv"/>

      <section className="hero hero--product" style={{"--hero-image": HERO_IMG}}>
        <div className="hero__bg"></div>
        <div className="container hero__inner">
          <span className="eyebrow" style={{color: "#C8DCA0"}}>Leistung · Betriebliche Krankenversicherung</span>
          <h1 style={{textWrap: "balance"}}>Ein Gesundheits-Benefit, der Ihr Team spürbar besser stellt.</h1>
          <p className="lead">
            Mit der betrieblichen Krankenversicherung (bKV) bieten Sie Ihren Mitarbeitenden private
            Zusatzleistungen – Vorsorge, Zahn, Sehhilfe, Krankenhaus. Steuerlich begünstigt, einfach
            umzusetzen und im Wettbewerb um Fachkräfte ein echter Unterschied.
          </p>
          <div className="hero__cta">
            <a href="#schnellcheck" className="btn btn--primary btn--lg">
              Schnellcheck starten <Icon path={I.arrowRight} size={18} strokeWidth={2}/>
            </a>
          </div>
        </div>
      </section>

      <section className="section">
        <div className="container">
          <div className="product-grid">
            <div>
              <span className="eyebrow">Was ist das?</span>
              <h2>Der Arbeitgeber als Versicherungsnehmer für sein Team.</h2>
              <p className="muted" style={{fontSize: "1.0625rem"}}>
                Bei der bKV schließt das Unternehmen einen Gruppenvertrag bei einer privaten
                Krankenversicherung ab und versichert seine Mitarbeitenden ohne Gesundheitsprüfung.
                Bis zur monatlichen Sachbezugsgrenze von 50 Euro je Beschäftigtem ist der Beitrag
                lohnsteuer- und sozialversicherungsfrei – netto bleibt deutlich mehr als bei einer
                gleich teuren Gehaltserhöhung.
              </p>

              <h3 style={{marginTop: 40}}>Welche Leistungen sind typisch?</h3>
              <div className="coverage-grid">
                <ul>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Zahnersatz und Zahnreinigung</strong> – die meistgenutzte Leistung</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Sehhilfen</strong> – Brillen, Kontaktlinsen, LASIK</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Vorsorgeuntersuchungen</strong> – über den GKV-Katalog hinaus</span></li>
                </ul>
                <ul>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Heilpraktiker & Naturheilverfahren</strong></span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Krankenhaus-Komfortleistungen</strong> – Ein-/Zweibettzimmer, Chefarzt</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Auslandsreisekranken­versicherung</strong> für Geschäfts- und Privatreisen</span></li>
                </ul>
              </div>

              <h3 style={{marginTop: 40}}>Warum lohnt sich die bKV?</h3>
              <div className="who-list">
                <div className="tag"><Icon path={I.spark} strokeWidth={1.8}/>Spürbarer Netto-Mehrwert</div>
                <div className="tag"><Icon path={I.users} strokeWidth={1.8}/>Stärkere Mitarbeiterbindung</div>
                <div className="tag"><Icon path={I.heart} strokeWidth={1.8}/>Positionierung als attraktiver Arbeitgeber</div>
                <div className="tag"><Icon path={I.euro} strokeWidth={1.8}/>Steuer- und sozialabgabenfrei</div>
                <div className="tag"><Icon path={I.bolt} strokeWidth={1.8}/>Einfache Umsetzung als Gruppenvertrag</div>
                <div className="tag"><Icon path={I.check} strokeWidth={1.8}/>Ohne Gesundheitsprüfung</div>
              </div>
            </div>

            <aside>
              <div className="fact-card">
                <h4>Auf einen Blick</h4>
                <ul>
                  <li><strong>Versicherungsnehmer</strong><span>Arbeitgeber</span></li>
                  <li><strong>Versicherte</strong><span>Mitarbeitende</span></li>
                  <li><strong>Sachbezugsgrenze</strong><span>50 € / Monat</span></li>
                  <li><strong>Gesundheitsprüfung</strong><span>Entfällt im Gruppenvertrag</span></li>
                </ul>
              </div>

              <div className="card" style={{marginTop: 20}}>
                <h4>Was kostet das pro Mitarbeiter?</h4>
                <p className="muted" style={{fontSize: "0.9375rem"}}>
                  Übliche Modelle liegen zwischen 15 und 50 Euro pro Person und Monat,
                  abhängig vom gewählten Leistungsbudget. Innerhalb der Sachbezugsgrenze
                  trägt der Arbeitgeber den Beitrag steuer- und abgabenfrei.
                </p>
                <p className="muted" style={{fontSize: "0.9375rem", marginBottom: 0}}>
                  Wir zeigen Ihnen die rechnerische Wirkung im Vergleich zu einer
                  Gehaltserhöhung – netto für den Mitarbeitenden, brutto für Ihren Betrieb.
                </p>
              </div>

              <a href="#schnellcheck" className="btn btn--primary btn--lg" style={{marginTop: 20, width: "100%"}}>
                bKV-Konzept anfragen
              </a>
            </aside>
          </div>
        </div>
      </section>

      <SchnellcheckSection/>
      <CTAStrip/>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page/>);
</script>
</body>
</html>
