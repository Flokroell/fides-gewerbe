    {"@type":"Question","name":"Was kostet eine Betriebshaftpflicht­versicherung für mein Gewerbe?","acceptedAnswer":{"@type":"Answer","text":"Die Jahresprämie richtet sich nach Branche, Umsatz, Mitarbeiterzahl und gewünschten Deckungs­bausteinen. Kleinbetriebe und Solo-Selbständige starten häufig im niedrigen dreistelligen Bereich pro Jahr, mittelständische Handwerks- oder Gastronomiebetriebe liegen meist im mittleren bis hohen dreistelligen Bereich. Eine seriöse Aussage ist nur nach Vergleich konkreter Angebote möglich."}},
    {"@type":"Question","name":"Brauche ich als Solo-Selbständiger überhaupt eine Gewerbeversicherung?","acceptedAnswer":{"@type":"Answer","text":"In den meisten Fällen ja – sobald Sie geschäftlich Kontakt zu Kunden, Lieferanten oder gemieteten Räumen haben, können bereits kleinere Pannen zu existenz­gefährdenden Forderungen führen. Welche Bausteine konkret nötig sind, hängt von Ihrer Tätigkeit ab. Beratungs- und Planungsberufe brauchen zusätzlich eine Berufshaftpflicht."}},
    {"@type":"Question","name":"Was ist der Unterschied zwischen Versicherungsmakler und Versicherungsvertreter?","acceptedAnswer":{"@type":"Answer","text":"Ein Vertreter arbeitet im Auftrag eines bestimmten Versicherers und verkauft dessen Produkte. Ein Makler – wie fides – arbeitet im Auftrag des Kunden, ist gesetzlich zur Marktbeobachtung verpflichtet und vergleicht Angebote vieler Gesellschaften. Wir empfehlen den Tarif, der Ihren Bedarf am besten abdeckt, nicht den, der die beste Provision zahlt."}},
    {"@type":"Question","name":"Wie funktioniert die betriebliche Krankenversicherung (bKV) konkret?","acceptedAnswer":{"@type":"Answer","text":"Der Arbeitgeber schließt einen Gruppen­vertrag bei einem privaten Krankenversicherer ab und versichert seine Mitarbeitenden ohne Gesundheitsprüfung. Bis zur monatlichen Sachbezugs­grenze von 50 Euro je Beschäftigtem ist der Beitrag steuer- und sozialabgabenfrei. Die Mitarbeitenden nutzen die Leistungen direkt – typisch sind Zahn, Sehhilfe, Vorsorge und Krankenhausleistungen."}},
    {"@type":"Question","name":"Welche Versicherungen sind für Handwerksbetriebe in Bayern besonders wichtig?","acceptedAnswer":{"@type":"Answer","text":"Pflicht ist faktisch die Betriebshaftpflicht. Ergänzend lohnen sich Inhalts- und Geschäftsgebäude­versicherung, eine Werkverkehrs- oder Maschinenversicherung sowie bei Beschäftigten zunehmend die betriebliche Krankenversicherung. Welche Bausteine sich rechnen, prüfen wir individuell – Pauschal­empfehlungen wären unseriös."}},
    {"@type":"Question","name":"Wie läuft eine Schadenmeldung bei fides ab?","acceptedAnswer":{"@type":"Answer","text":"Sie melden den Schaden direkt bei uns – per Telefon, E-Mail oder persönlich. Wir nehmen alle relevanten Informationen auf, leiten den Schaden an den Versicherer weiter und übernehmen die Kommunikation. Bei Bedarf koordinieren wir auch Gutachter, Anwälte oder Sachverständige. Sie haben einen festen Ansprech­partner bis zur abschließenden Regulierung."}},
    {"@type":"Question","name":"Lohnt es sich, mehrere Verträge zu bündeln?","acceptedAnswer":{"@type":"Answer","text":"Oft ja: Mehrere Risiken aus einer Hand bei einem Versicherer können günstigere Konditionen und eine konsistente Schadenbearbeitung bedeuten. Allerdings ist Bündelung nie Selbstzweck – wenn ein Wettbewerber im Einzelbaustein deutlich bessere Bedingungen hat, empfehlen wir diesen. Was sich für Sie wirklich rechnet, zeigen wir transparent im Angebotsvergleich."}},
    {"@type":"Question","name":"Können Sie mir auch in Landsberg am Lech oder Weilheim weiterhelfen?","acceptedAnswer":{"@type":"Answer","text":"Ja. Unser Büro steht in Schongau, betreut werden Gewerbekunden im gesamten Pfaffenwinkel, im Landkreis Weilheim-Schongau, in Landsberg am Lech und in den angrenzenden Regionen. Termine sind vor Ort, in Ihrem Betrieb oder per Video möglich."}},
    {"@type":"Question","name":"Wie lange dauert es, bis ich nach dem Schnellcheck eine Auswertung erhalte?",
     "acceptedAnswer":{"@type":"Answer","text":"Der Schnellcheck selbst nimmt ungefähr 60 Sekunden in Anspruch. Wir melden uns innerhalb eines Werktages telefonisch oder per E-Mail mit einer Einschätzung. Wenn wir konkrete Angebote vorbereiten, dauert das je nach Komplexität ein bis fünf Werktage."}},
    {"@type":"Question","name":"Kostet die Beratung etwas?","acceptedAnswer":{"@type":"Answer","text":"Nein. Die Erstberatung und der Marktvergleich sind für Sie unverbindlich und kostenfrei. Als Makler erhalten wir unsere Vergütung über die Courtage des Versicherers, mit dem Sie sich am Ende für einen Vertrag entscheiden. Reine Honorarberatung bieten wir auf Wunsch ebenfalls an – dann offen ausgewiesen statt eingerechnet."}}
