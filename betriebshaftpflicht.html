<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" src="shared/components.jsx"></script>

<script type="text/babel" data-presets="react">
const { Icon, I, Header, Footer, SchnellcheckSection, CTAStrip } = window.fides;

const HERO_IMG = "url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=2000&q=80')";

function Page() {
  return (
    <>
      <Header active="bhv"/>

      <section className="hero hero--product" style={{"--hero-image": HERO_IMG}}>
        <div className="hero__bg"></div>
        <div className="container hero__inner">
          <span className="eyebrow" style={{color: "#C8DCA0"}}>Leistung · Betriebshaftpflicht</span>
          <h1 style={{textWrap: "balance"}}>Betriebshaftpflicht: Der Grundschutz für jeden Betrieb.</h1>
          <p className="lead">
            Ein Kunde rutscht in Ihrem Geschäft aus, eine Lieferung beschädigt fremdes Eigentum,
            ein Mitarbeiter verursacht einen Fehler bei der Arbeit beim Kunden – die Betriebshaftpflicht
            übernimmt berechtigte Ansprüche und wehrt unberechtigte ab.
          </p>
          <div className="hero__cta">
            <a href="#schnellcheck" className="btn btn--primary btn--lg">
              Schnellcheck starten <Icon path={I.arrowRight} size={18} strokeWidth={2}/>
            </a>
          </div>
        </div>
      </section>

      <section className="section">
        <div className="container">
          <div className="product-grid">
            <div>
              <span className="eyebrow">Was ist das?</span>
              <h2>Schutz vor Schadenersatz­ansprüchen Dritter.</h2>
              <p className="muted" style={{fontSize: "1.0625rem"}}>
                Die Betriebshaftpflicht ist für Unternehmen das, was die Privathaftpflicht für Privatpersonen ist:
                Sie reguliert Schäden, die Sie oder Ihre Mitarbeitenden im Rahmen der betrieblichen Tätigkeit
                verursachen. Im Schadenfall prüft der Versicherer den Anspruch, zahlt berechtigte Forderungen
                und wehrt unberechtigte – notfalls vor Gericht – auf eigene Kosten ab.
              </p>

              <h3 style={{marginTop: 40}}>Was ist abgedeckt?</h3>
              <div className="coverage-grid">
                <ul>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Personenschäden</strong> – etwa Verletzungen von Kunden, Lieferanten oder Passanten</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Sachschäden</strong> – an fremdem Eigentum, von der Werkstatt bis zur Kundenwohnung</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Folgeschäden</strong> – wirtschaftliche Schäden, die aus Personen- oder Sachschäden entstehen</span></li>
                </ul>
                <ul>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Tätigkeitsschäden</strong> – Schäden an Objekten, an denen Sie gerade arbeiten</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Mietsachschäden</strong> – an gemieteten Geschäftsräumen und Inventar</span></li>
                  <li><Icon path={I.check} strokeWidth={2}/><span><strong>Abwehrkostenschutz</strong> – Rechtsverteidigung bei unberechtigten Forderungen</span></li>
                </ul>
              </div>

              <h3 style={{marginTop: 40}}>Wer braucht sie?</h3>
              <p className="muted">
                Praktisch jedes Gewerbe profitiert von einer Betriebshaftpflicht – in vielen Branchen
                ist sie über die Berufsgenossenschaft, Innung oder den Vermieter sogar faktisch verpflichtend.
              </p>
              <div className="who-list">
                <div className="tag"><Icon path={I.building} strokeWidth={1.8}/>Handwerksbetriebe</div>
                <div className="tag"><Icon path={I.building} strokeWidth={1.8}/>Gastronomie & Hotellerie</div>
                <div className="tag"><Icon path={I.building} strokeWidth={1.8}/>Einzelhandel</div>
                <div className="tag"><Icon path={I.building} strokeWidth={1.8}/>Dienstleister mit Kundenkontakt</div>
                <div className="tag"><Icon path={I.building} strokeWidth={1.8}/>Produktion & Werkstätten</div>
                <div className="tag"><Icon path={I.building} strokeWidth={1.8}/>Vereine & Veranstaltungen</div>
              </div>
            </div>

            <aside>
              <div className="fact-card">
                <h4>Auf einen Blick</h4>
                <ul>
                  <li><strong>Wer?</strong><span>Alle Gewerbebetriebe</span></li>
                  <li><strong>Schützt vor</strong><span>Personen- & Sachschäden</span></li>
                  <li><strong>Pflicht?</strong><span>Branchenabhängig</span></li>
                  <li><strong>Typische Summe</strong><span>3–10 Mio. €</span></li>
                </ul>
              </div>

              <div className="card" style={{marginTop: 20}}>
                <h4>Was kostet eine Betriebshaftpflicht?</h4>
                <p className="muted" style={{fontSize: "0.9375rem"}}>
                  Eine pauschale Antwort wäre unseriös – der Beitrag richtet sich nach Branche,
                  Umsatz, Mitarbeiterzahl und gewünschten Deckungsbausteinen. Kleinbetriebe starten
                  oft im niedrigen dreistelligen Bereich pro Jahr, mittlere Handwerks- oder
                  Gastronomiebetriebe liegen meist im mittleren bis hohen dreistelligen Bereich.
                </p>
                <p className="muted" style={{fontSize: "0.9375rem", marginBottom: 0}}>
                  Wir vergleichen für Sie konkrete Angebote – ohne Kostenfalle, ohne Lockprämie.
                </p>
              </div>

              <a href="#schnellcheck" className="btn btn--primary btn--lg" style={{marginTop: 20, width: "100%"}}>
                Beitrag berechnen lassen
              </a>
            </aside>
          </div>
        </div>
      </section>

      <SchnellcheckSection/>
      <CTAStrip/>
      <Footer/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Page/>);
</script>
<script defer src="/shared/chatbot.js"></script>
